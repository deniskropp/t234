<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0b0f19" />
  
  <!-- Slack-like Bubble -->
  <path d="M 100 100 Q 100 80 120 80 L 280 80 Q 300 80 300 100 L 300 250 Q 300 270 280 270 L 140 270 L 100 310 Z" fill="none" stroke="#00e5ff" stroke-width="2" />
  
  <!-- Interference Static -->
  <g stroke="#f000ff" stroke-width="1" stroke-opacity="0.5">
    <line x1="120" y1="120" x2="280" y2="120">
      <animate attributeName="x1" values="120;140;120" dur="0.1s" repeatCount="indefinite" />
      <animate attributeName="x2" values="280;260;280" dur="0.1s" repeatCount="indefinite" />
    </line>
    <line x1="120" y1="160" x2="280" y2="160">
      <animate attributeName="x1" values="120;100;120" dur="0.15s" repeatCount="indefinite" />
    </line>
    <line x1="120" y1="200" x2="280" y2="200" stroke="#ffea00">
      <animate attributeName="y1" values="200;210;200" dur="0.2s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- "Typing" Indicator (Glitchy) -->
  <circle cx="130" cy="240" r="4" fill="#00e5ff">
    <animate attributeName="opacity" values="0;1;0" dur="0.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="150" cy="240" r="4" fill="#00e5ff">
    <animate attributeName="opacity" values="0;1;0" dur="0.6s" begin="0.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="170" cy="240" r="4" fill="#00e5ff">
    <animate attributeName="opacity" values="0;1;0" dur="0.6s" begin="0.4s" repeatCount="indefinite" />
  </circle>
  
  <!-- Swarm Status -->
  <text x="130" y="110" fill="#00e5ff" font-family="monospace" font-size="10">STATUS: SWARM_SYNCING...</text>
  <text x="130" y="135" fill="#f000ff" font-family="monospace" font-size="12" font-weight="bold">⫻data/trace:interference</text>
  
  <!-- Radar circles from bubble -->
  <circle cx="100" cy="310" r="10" fill="none" stroke="#00e5ff" stroke-width="1">
    <animate attributeName="r" values="10;50" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Label -->
  <text x="140" y="380" fill="#00e5ff" font-family="monospace" font-size="14">⫻swarm/parallel</text>
</svg>