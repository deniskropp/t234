<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0b0f19" />
  
  <!-- Jira Columns -->
  <g stroke="#94a3b8" stroke-width="1" stroke-opacity="0.3">
    <rect x="50" y="50" width="90" height="300" rx="5" />
    <rect x="155" y="50" width="90" height="300" rx="5" />
    <rect x="260" y="50" width="90" height="300" rx="5" />
  </g>
  
  <!-- Cards -->
  <rect x="60" y="70" width="70" height="30" rx="2" fill="#1a2235" />
  <rect x="165" y="120" width="70" height="30" rx="2" fill="#1a2235" />
  <rect x="165" y="160" width="70" height="30" rx="2" fill="#1a2235" />
  
  <!-- Hijack Glitch Overlay -->
  <g>
    <rect x="150" y="100" width="100" height="200" fill="#f000ff" fill-opacity="0.1" stroke="#f000ff" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.1;0.8;0.1" dur="0.5s" repeatCount="indefinite" />
    </rect>
    <text x="160" y="140" fill="#f000ff" font-family="monospace" font-size="10" font-weight="bold">HIJACK_ACTIVE</text>
    <text x="160" y="160" fill="#00e5ff" font-family="monospace" font-size="8">⫻cmd/exec:G3</text>
    
    <!-- Static Lines -->
    <line x1="150" y1="180" x2="250" y2="180" stroke="#ffea00" stroke-width="1">
       <animate attributeName="y1" values="180;280;180" dur="2s" repeatCount="indefinite" />
       <animate attributeName="y2" values="180;280;180" dur="2s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Scanning Line -->
  <rect x="50" y="0" width="300" height="2" fill="#00e5ff" opacity="0.5">
    <animate attributeName="y" values="0;400;0" dur="4s" repeatCount="indefinite" />
  </rect>
  
  <!-- Label -->
  <text x="140" y="380" fill="#f000ff" font-family="monospace" font-size="14">⫻systemic/intervention</text>
</svg>