<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0b0f19" />
  
  <!-- Email Envelope Base -->
  <path d="M 100 150 L 300 150 L 300 300 L 100 300 Z" fill="none" stroke="#00e5ff" stroke-width="2" />
  <path d="M 100 150 L 200 225 L 300 150" fill="none" stroke="#00e5ff" stroke-width="2" />
  
  <!-- Prism -->
  <path d="M 200 100 L 230 160 L 170 160 Z" fill="none" stroke="#ffea00" stroke-width="2" />
  
  <!-- Refracted Rays -->
  <line x1="200" y1="50" x2="200" y2="100" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="1s" repeatCount="indefinite" />
  </line>
  
  <line x1="200" y1="160" x2="150" y2="350" stroke="#00e5ff" stroke-width="3">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
  </line>
  <line x1="200" y1="160" x2="250" y2="350" stroke="#f000ff" stroke-width="3">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
  </line>
  
  <!-- Glitch Particles -->
  <rect x="140" y="250" width="10" height="2" fill="#00e5ff">
    <animate attributeName="x" values="140;160;140" dur="0.2s" repeatCount="indefinite" />
  </rect>
  <rect x="250" y="200" width="15" height="1" fill="#f000ff">
    <animate attributeName="x" values="250;230;250" dur="0.3s" repeatCount="indefinite" />
  </rect>
  
  <!-- Label -->
  <text x="140" y="380" fill="#00e5ff" font-family="monospace" font-size="14">⫻semantic/refract</text>
</svg>